<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Portfolio</title>
    <style>
        /* CSS Styling here */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
        }
        /* Add styles for sections, animations, and other features */
        /* Example: Loader style */
        .loader {
            display: none;
            /* More styles */
        }
        /* Sticky navigation */
        nav {
            position: sticky;
            top: 0;
            /* More styles */
        }
        /* Progress bar tracking styles */
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Example: Custom cursor following
            const cursor = document.querySelector('.custom-cursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.top = `${e.clientY}px`;
                cursor.style.left = `${e.clientX}px`;
            });

            // Loader auto-hide and other features
        });
    </script>
</head>
<body>
    <header class="hero">
        <h1>Welcome to My Portfolio</h1>
    </header>
    <section class="about">
        <h2>About Me</h2>
        <p>Information about me.</p>
    </section>
    <section class="work">
        <h2>My Work</h2>
        <p>Details of projects.</p>
    </section>
    <section class="contact">
        <h2>Contact</h2>
        <p>How to reach me.</p>
    </section>
    <script>
        // JavaScript functions for interactive features
    </script>
</body>
</html>
