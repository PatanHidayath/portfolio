<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Patan Hidayath — Clinical Research Professional</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Outfit:wght@300;400;500;600&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & TOKENS ─────────────────────────────────────────── */
* , ::before , *::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F6F1E9;--cream2:#EDE7D9;--cream3:#E5DECE;--sand:#D4C9B4;--sand2:#C2B49E;
  --rust:#C4622D;--rust2:#A04E22;--rust3:#8A3E18;--rust-lt:#E8865A;--rust-pale:#F3D4C3;
  --ink:#1A1612;--ink2:#2C2520;--ink3:#3D3530;
  --stone:#6B6058;--stone2:#8C8078;--stone3:#A89F97;
  --sage:#4E6B5A;--sage-lt:#7A9E8A;
  --gold:#C9A84C;--gold-lt:#E8CC88;
  --ff-serif:'Cormorant Garamond',Georgia,serif;
  --ff-sans:'Outfit',sans-serif;
  --ff-mono:'DM Mono',monospace;
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --ease-in:cubic-bezier(0.7,0,0.84,0);
  --ease-inout:cubic-bezier(0.87,0,0.13,1);
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --dur-fast:0.25s;--dur-med:0.55s;--dur-slow:0.9s;
}
html{scroll-behavior:smooth;font-size:16px;overflow-x:hidden}
body{background:var(--cream);color:var(--ink);font-family:var(--ff-sans);overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* ─── CUSTOM CURSOR ──────────────────────────────────────────── */
@media(pointer:fine){body,a,button,[role=button]{cursor:none!important}}
#cursor-dot{
  position:fixed;z-index:10000;pointer-events:none;
  width:6px;height:6px;border-radius:50%;
  background:var(--rust);
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,background .2s;
  will-change:transform;
}
#cursor-ring{
  position:fixed;z-index:9999;pointer-events:none;
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid rgba(196,98,45,0.35);
  transform:translate(-50%,-50%);
  transition:width .4s var(--ease-out),height .4s var(--ease-out),opacity .3s,border-color .3s;
  will-change:transform;
}
#cursor-ring.hover{width:60px;height:60px;border-color:rgba(196,98,45,0.2);background:rgba(196,98,45,0.04)}
#cursor-ring.click{width:22px;height:22px;border-color:var(--rust)}
@media(pointer:coarse){#cursor-dot,#cursor-ring{display:none}}

/* ─── NOISE TEXTURE OVERLAY ──────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;z-index:9000;pointer-events:none;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;
}

/* ─── LOADER ─────────────────────────────────────────────────── */
#loader{
  position:fixed;inset:0;z-index:8500;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  transition:opacity .8s var(--ease-inout),visibility .8s;
}
#loader.done{opacity:0;visibility:hidden;pointer-events:none}
.loader-name{
  font-family:var(--ff-serif);font-size:clamp(28px,5vw,52px);font-weight:300;
  color:var(--cream);letter-spacing:8px;overflow:hidden;
}
.loader-name span{
  display:inline-block;opacity:0;transform:translateY(100%);
  animation:charRise .7s var(--ease-out) both;
}
.loader-bar-wrap{width:200px;height:1px;background:rgba(245,240,232,.12);overflow:hidden}
.loader-bar{width:0%;height:100%;background:var(--rust);animation:loadProgress 1.6s var(--ease-inout) .3s both}
.loader-pct{font-family:var(--ff-mono);font-size:9px;letter-spacing:3px;color:rgba(245,240,232,.28);margin-top:6px}
@keyframes loadProgress{to{width:100%}}
@keyframes charRise{to{opacity:1;transform:translateY(0)}}

/* ─── PROGRESS BAR ───────────────────────────────────────────── */
#progress-bar{
  position:fixed;top:0;left:0;z-index:9000;height:2px;
  background:linear-gradient(90deg,var(--rust),var(--rust-lt));
  width:0%;transition:width .1s linear;pointer-events:none;
}

/* ─── NAV ────────────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:600;
  padding:24px clamp(24px,5vw,72px);
  display:flex;align-items:center;justify-content:space-between;
  transition:background .5s,padding .4s var(--ease-out),box-shadow .4s;
}
nav.stuck{
  background:rgba(246,241,233,.9);backdrop-filter:blur(20px) saturate(1.3);
  padding-top:14px;padding-bottom:14px;
  box-shadow:0 1px 0 rgba(212,201,180,.6);
}
.nbrand{
  font-family:var(--ff-serif);font-size:22px;font-weight:600;
  color:var(--ink);text-decoration:none;
  display:flex;align-items:baseline;gap:5px;
  transition:color .2s;
}
.nbrand sup{
  font-family:var(--ff-mono);font-size:8px;
  vertical-align:super;color:var(--rust);letter-spacing:2px;
  transition:color .2s;
}
.nbrand:hover sup{color:var(--gold)}
.nlinks{display:flex;align-items:center;gap:36px;list-style:none}
.nlinks a{
  font-family:var(--ff-mono);font-size:9.5px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--stone);text-decoration:none;
  position:relative;transition:color .25s;padding-bottom:2px;
}
.nlinks a::after{
  content:'';position:absolute;bottom:0;left:0;width:0;height:1px;
  background:var(--rust);transition:width .35s var(--ease-out);
}
.nlinks a:hover{color:var(--rust)}
.nlinks a:hover::after{width:100%}
.ncta{
  background:var(--ink)!important;color:var(--cream)!important;
  padding:10px 24px!important;border-radius:2px;letter-spacing:1.5px!important;
  transition:background .25s,transform .2s,box-shadow .25s!important;
}
.ncta::after{display:none!important}
.ncta:hover{background:var(--rust)!important;color:#fff!important;transform:translateY(-1px);box-shadow:0 8px 24px rgba(196,98,45,.3)!important}
.burger{display:none;flex-direction:column;gap:5.5px;background:none;border:none;padding:4px;z-index:700;transition:opacity .2s}
.burger span{display:block;width:24px;height:1.5px;background:var(--ink);transition:transform .35s var(--ease-out),opacity .25s,width .3s;transform-origin:center}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0;width:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mob-nav{
  position:fixed;inset:0;z-index:580;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  padding:clamp(48px,10vw,88px) clamp(32px,8vw,72px);
  transform:translateX(100%);
  transition:transform .6s var(--ease-out);
  clip-path:inset(0 0 0 100%);
  transition:transform .6s var(--ease-out),clip-path .6s var(--ease-out);
}
.mob-nav.open{transform:translateX(0);clip-path:inset(0 0 0 0%)}
.mob-nav a{
  font-family:var(--ff-serif);font-size:clamp(32px,7vw,56px);font-weight:300;
  color:rgba(245,240,232,.2);text-decoration:none;line-height:1.3;
  display:block;opacity:0;transform:translateX(-30px);
  transition:color .3s,opacity .45s var(--ease-out),transform .45s var(--ease-out);
  letter-spacing:-0.5px;
}
.mob-nav.open a{opacity:1;transform:translateX(0)}
.mob-nav.open a:nth-child(1){transition-delay:.07s}.mob-nav.open a:nth-child(2){transition-delay:.12s}
.mob-nav.open a:nth-child(3){transition-delay:.17s}.mob-nav.open a:nth-child(4){transition-delay:.22s}
.mob-nav.open a:nth-child(5){transition-delay:.27s}.mob-nav.open a:nth-child(6){transition-delay:.32s}
.mob-nav.open a:nth-child(7){transition-delay:.37s}
.mob-nav a:hover{color:var(--cream)}
.mob-nav-email{
  position:absolute;bottom:40px;left:clamp(32px,8vw,72px);
  font-family:var(--ff-mono);font-size:9px;color:rgba(245,240,232,.2);
  letter-spacing:1.5px;
}
.mob-nav-line{width:40px;height:1px;background:rgba(196,98,45,.4);margin-bottom:32px}

/* ─── HERO ───────────────────────────────────────────────────── */
#hero{
  min-height:100svh;
  display:grid;grid-template-columns:56% 44%;
  padding-top:88px;
  position:relative;overflow:hidden;
}
/* animated grid background */
.h-bg-grid{
  position:absolute;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(196,98,45,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(196,98,45,.06) 1px,transparent 1px);
  background-size:56px 56px;
  animation:gridFloat 18s ease-in-out infinite;
}
@keyframes gridFloat{0%,100%{background-position:0 0}50%{background-position:28px 28px}}
.h-bg-orb{
  position:absolute;bottom:-20%;right:0;width:60%;aspect-ratio:1;
  background:radial-gradient(circle at 60% 40%,rgba(196,98,45,.12),transparent 65%);
  animation:orbPulse 8s ease-in-out infinite;
  z-index:0;
}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}

.h-left{
  padding:clamp(56px,7vw,96px) clamp(24px,5vw,72px) 80px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;z-index:2;
}
.h-eyebrow{
  display:flex;align-items:center;gap:14px;
  font-family:var(--ff-mono);font-size:9.5px;letter-spacing:3.5px;
  color:var(--rust);text-transform:uppercase;margin-bottom:28px;
  opacity:0;animation:riseUp .7s var(--ease-out) .7s both;
}
.h-eyebrow-line{width:36px;height:1px;background:linear-gradient(90deg,var(--rust),var(--rust-lt));flex-shrink:0}
.h-eyebrow-dot{width:4px;height:4px;border-radius:50%;background:var(--rust);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.h-name{
  font-family:var(--ff-serif);
  font-size:clamp(56px,7.5vw,108px);
  font-weight:300;line-height:.92;letter-spacing:-2px;
  margin-bottom:4px;
}
.h-name .w{
  display:inline-block;opacity:0;
  transform:translateY(70px) rotate(-2deg);
  animation:heroWord 1s var(--spring) both;
}
.h-name .w:nth-child(1){animation-delay:.75s}
.h-name .w:nth-child(2){animation-delay:.9s;color:var(--rust)}
@keyframes heroWord{to{opacity:1;transform:translateY(0) rotate(0deg)}}

.h-italic{
  font-family:var(--ff-serif);
  font-size:clamp(44px,5.8vw,84px);
  font-weight:300;font-style:italic;
  color:var(--stone2);line-height:1;
  opacity:0;animation:riseUp .9s var(--ease-out) 1.08s both;
  margin-bottom:32px;position:relative;display:inline-block;
}
.h-italic-underline{
  position:absolute;bottom:-6px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--rust-pale),transparent);
  transform:scaleX(0);transform-origin:left;
  animation:underlineGrow 1s var(--ease-out) 1.6s both;
}
@keyframes underlineGrow{to{transform:scaleX(1)}}

.h-role{
  font-size:clamp(13.5px,1.35vw,16px);color:var(--stone);
  line-height:1.85;max-width:440px;
  margin-bottom:40px;
  opacity:0;animation:riseUp .7s var(--ease-out) 1.25s both;
}
.h-role strong{color:var(--ink);font-weight:600}
.h-btns{
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  opacity:0;animation:riseUp .7s var(--ease-out) 1.45s both;
}
.btn-p{
  background:var(--rust);color:#fff;
  font-family:var(--ff-mono);font-size:9.5px;letter-spacing:2.5px;
  text-transform:uppercase;padding:16px 36px;
  border:none;border-radius:2px;text-decoration:none;
  display:inline-flex;align-items:center;gap:10px;
  transition:background .3s,transform .25s var(--spring),box-shadow .3s;
  position:relative;overflow:hidden;
}
.btn-p::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity .3s;
}
.btn-p:hover::before{opacity:1}
.btn-p:hover{background:var(--rust2);transform:translateY(-3px);box-shadow:0 16px 40px rgba(196,98,45,.35)}
.btn-p-arrow{transition:transform .3s var(--spring)}
.btn-p:hover .btn-p-arrow{transform:translate(3px,-3px)}
.btn-g{
  font-family:var(--ff-mono);font-size:9.5px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--stone);text-decoration:none;
  display:inline-flex;align-items:center;gap:9px;
  position:relative;padding-bottom:3px;
  transition:color .25s;
}
.btn-g::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:var(--sand2);transition:background .25s;
}
.btn-g:hover{color:var(--rust)}
.btn-g:hover::after{background:var(--rust)}

.h-stats{
  display:flex;gap:0;flex-wrap:wrap;
  margin-top:64px;padding-top:36px;border-top:1px solid var(--sand);
  opacity:0;animation:riseUp .7s var(--ease-out) 1.65s both;
}
.hs-item{padding-right:36px;border-right:1px solid var(--sand);margin-right:36px}
.hs-item:last-child{padding-right:0;border-right:none;margin-right:0}
.hs-num{
  font-family:var(--ff-serif);font-size:44px;font-weight:600;
  color:var(--ink);line-height:1;display:block;letter-spacing:-1.5px;
}
.hs-num em{color:var(--rust);font-style:normal}
.hs-lbl{
  font-family:var(--ff-mono);font-size:8.5px;letter-spacing:2px;
  text-transform:uppercase;color:var(--stone2);margin-top:5px;display:block;
}

/* Hero right panel */
.h-right{
  position:relative;overflow:hidden;
  background:var(--cream3);
}
.h-right-pattern{
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 47px,
    rgba(180,165,140,.15) 48px
  ),repeating-linear-gradient(
    90deg,transparent,transparent 47px,
    rgba(180,165,140,.15) 48px
  );
}
.h-right-shade{
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 60%,rgba(196,98,45,.07));
}
.h-photo-wrap{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(300px,72%);
  opacity:0;animation:riseUp 1.1s var(--ease-out) .55s both;
}
.h-photo{
  aspect-ratio:3/4;
  background:var(--cream2);
  border:1px solid var(--sand);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;
  color:var(--stone2);font-family:var(--ff-mono);font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  position:relative;overflow:hidden;
}
.h-photo-corner{position:absolute;width:24px;height:24px;border-color:var(--rust);border-style:solid;border-width:0}
.h-photo-corner.tl{top:16px;left:16px;border-top-width:1.5px;border-left-width:1.5px}
.h-photo-corner.br{bottom:16px;right:16px;border-bottom-width:1.5px;border-right-width:1.5px}
.h-photo-ico{font-size:52px;opacity:.15;line-height:1}
.h-photo-line{width:40px;height:1px;background:var(--sand2)}
.h-photo-scan{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(196,98,45,.4),transparent);
  animation:scanLine 3.5s ease-in-out infinite 1.5s;
}
@keyframes scanLine{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
.h-badge{
  position:absolute;bottom:32px;right:-4px;
  background:var(--ink);color:var(--cream);
  padding:18px 22px 18px 22px;
  font-family:var(--ff-serif);font-size:13.5px;font-style:italic;
  line-height:1.65;max-width:200px;
  opacity:0;animation:riseUp 1s var(--ease-out) 1.2s both;
  border-left:2px solid var(--rust);
}
.h-badge strong{
  display:block;font-style:normal;
  font-family:var(--ff-mono);font-size:7.5px;letter-spacing:2px;
  color:var(--rust-lt);margin-bottom:7px;text-transform:uppercase;
}
.h-badge-dot{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--rust-lt);vertical-align:middle;margin-right:6px;
  animation:blink 1.8s ease infinite .4s;
}
.h-tag-float{
  position:absolute;top:28px;left:20px;
  font-family:var(--ff-mono);font-size:8px;letter-spacing:2px;
  text-transform:uppercase;color:var(--stone);
  opacity:0;animation:riseUp .8s var(--ease-out) 1.4s both;
}
.scroll-cue{
  position:absolute;bottom:36px;left:clamp(24px,5vw,72px);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;animation:fadeIn 1.2s ease 2.4s both;z-index:2;
}
.scroll-cue-text{
  font-family:var(--ff-mono);font-size:8px;letter-spacing:3px;
  text-transform:uppercase;color:var(--stone3);writing-mode:vertical-rl;
}
.scroll-cue-line{
  width:1px;height:56px;overflow:hidden;
  background:rgba(196,98,45,.15);position:relative;
}
.scroll-cue-line::after{
  content:'';position:absolute;top:-100%;left:0;width:100%;height:100%;
  background:var(--rust);animation:scrollPulse 2.4s ease-in-out infinite 2.4s;
}
@keyframes scrollPulse{0%{top:-100%;opacity:.6}100%{top:100%;opacity:0}}

/* ─── SHARED SECTION STYLES ──────────────────────────────────── */
section{padding:clamp(88px,11vw,140px) clamp(24px,5vw,72px)}
.eyebrow{
  font-family:var(--ff-mono);font-size:9px;letter-spacing:4px;
  text-transform:uppercase;color:var(--rust);
  display:flex;align-items:center;gap:14px;margin-bottom:18px;
}
.eyebrow::before{content:'';width:24px;height:1px;background:currentColor;flex-shrink:0}
.sh{
  font-family:var(--ff-serif);font-size:clamp(36px,5.2vw,68px);
  font-weight:300;line-height:1.04;letter-spacing:-.8px;color:var(--ink);
}
.sh em{font-style:italic;color:var(--rust)}
.sh-light{color:var(--cream);font-weight:300}
.sh-light em{color:var(--rust-lt)}
/* Scroll reveal variants */
.rv,.rvl,.rvr,.rvs{opacity:0;transition:opacity .8s var(--ease-out),transform .8s var(--ease-out)}
.rv{transform:translateY(32px)}
.rvl{transform:translateX(-32px)}
.rvr{transform:translateX(32px)}
.rvs{transform:scale(.96)}
.rv.in,.rvl.in,.rvr.in,.rvs.in{opacity:1;transform:none}

/* staggered children */
.stagger > *{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease-out),transform .7s var(--ease-out)}
.stagger.in > *:nth-child(1){opacity:1;transform:none;transition-delay:0s}
.stagger.in > *:nth-child(2){opacity:1;transform:none;transition-delay:.1s}
.stagger.in > *:nth-child(3){opacity:1;transform:none;transition-delay:.2s}
.stagger.in > *:nth-child(4){opacity:1;transform:none;transition-delay:.3s}
.stagger.in > *:nth-child(5){opacity:1;transform:none;transition-delay:.4s}
.stagger.in > *:nth-child(6){opacity:1;transform:none;transition-delay:.5s}
.stagger.in > *:nth-child(7){opacity:1;transform:none;transition-delay:.6s}
.stagger.in > *:nth-child(8){opacity:1;transform:none;transition-delay:.7s}

@keyframes riseUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ─── ABOUT ──────────────────────────────────────────────────── */
#about{
  background:var(--ink);color:var(--cream);
  display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(48px,7vw,110px);align-items:center;
  position:relative;overflow:hidden;
}
#about::before{
  content:'';position:absolute;top:-30%;right:-10%;
  width:50%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle,rgba(196,98,45,.08),transparent 70%);
  pointer-events:none;
}
#about .eyebrow{color:var(--rust-lt)}
#about .eyebrow::before{background:var(--rust-lt)}
.about-text{margin-top:28px}
.about-p{
  font-size:clamp(14px,1.4vw,16px);line-height:1.95;
  color:rgba(245,240,232,.55);
}
.about-p+.about-p{margin-top:18px}
